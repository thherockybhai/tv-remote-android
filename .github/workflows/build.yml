name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.1.1'

    - name: Build Debug APK
      run: gradle assembleDebug --stacktrace

    - name: Find APK
      run: find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: TvRemoteAgent-debug
        path: "**/*.apk"
        if-no-files-found: warn
